<!DOCTYPE html>

<html dir="rtl" lang="ar">
<head><link crossorigin="" href="https://www.gstatic.com" rel="preconnect"/><link href="https://cdnjs.cloudflare.com" rel="preconnect"/><link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/><link href="https://fonts.googleapis.com" rel="preconnect"/>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Programmers Academy - لوحة ولي الأمر</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="assets/css/parent.css" rel="stylesheet"/>
<link href="assets/css/uiux.css" rel="stylesheet"/>
<link href="assets/css/v20.css" rel="stylesheet"/>
<script defer="" src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script defer="" src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script defer="" src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<link href="assets/css/growth-ui.css" rel="stylesheet"/>
<link href="assets/css/smart-management.css" rel="stylesheet"/>
<link href="assets/css/signup.css" rel="stylesheet"/>
<link href="assets/img/favicon.ico" rel="icon"/><link href="assets/img/icon-180.png" rel="apple-touch-icon"/><link href="manifest.webmanifest" rel="manifest"/><meta content="#0057C8" name="theme-color"/><link href="assets/css/design-system.css" rel="stylesheet"/></head>
<body data-page="parent">
<div class="wrap">
<h1><i class="fas fa-people-roof"></i> لوحة ولي الأمر</h1>
<div class="card" id="login">
<p>ادخل بكود الطالب ورقم الهاتف المسجل.</p>
<input id="code" placeholder="كود الطالب"/>
<input id="phone" placeholder="رقم الهاتف / كلمة المرور"/>
<button class="btn" onclick="parentLogin()">دخول</button>
<button class="btn" onclick="toggleParentSignup()" style="margin-top:10px;background:#10b981"><i class="fas fa-user-plus"></i> إنشاء حساب جديد</button>
<div class="titan-signup-box" id="parent-signup-box">
<h3><i class="fas fa-user-plus"></i> طلب إنشاء حساب طالب / ولي أمر</h3>
<input id="parent-signup-name" placeholder="اسم الطالب بالكامل" type="text"/>
<input id="parent-signup-code" placeholder="كود الطالب المطلوب" type="text"/>
<select id="parent-signup-level"><option value="1">مستوى 1</option><option value="2">مستوى 2</option><option value="3">مستوى 3</option></select>
<input id="parent-signup-phone" placeholder="رقم الهاتف - 6 أرقام أو أكثر" type="tel"/>
<textarea id="parent-signup-note" placeholder="ملاحظة اختيارية: اسم ولي الأمر أو أي تفاصيل"></textarea>
<button class="btn" onclick="sendParentAccountRequest()" style="background:#2563eb"><i class="fas fa-paper-plane"></i> إرسال الطلب للإدارة</button>
<span class="titan-signup-note">بعد موافقة الإدارة ستدخل من هنا بنفس كود الطالب ورقم الهاتف.</span>
<div class="titan-signup-status" id="parent-signup-status"></div>
</div>
</div>
<div id="app" style="display:none">
<div class="card"><h2 id="student-name">--</h2><p id="student-level"></p></div>
<div class="grid">
<div class="kpi"><small>متوسط التقدم</small><br/><b id="avg-progress">0%</b></div>
<div class="kpi"><small>عدد الدروس المكتملة</small><br/><b id="done-lessons">0</b></div>
<div class="kpi"><small>الفواتير/المديونية</small><br/><b id="debt">0</b></div>
</div>
<div class="card"><h3>التقدم</h3><table><thead><tr><th>الدرس</th><th>النسبة</th></tr></thead><tbody id="progress-table"></tbody></table></div>
<div class="card"><h3>الدرجات</h3><table><thead><tr><th>الاختبار</th><th>الدرجة</th></tr></thead><tbody id="grades-table"></tbody></table></div>
<div class="card"><h3>الحضور</h3><table><thead><tr><th>الحصة</th><th>التاريخ</th></tr></thead><tbody id="attendance-table"></tbody></table></div>
</div>
</div>
<!-- ===== TITAN FEATURES PACK: parent ===== -->
<script defer="" src="assets/js/platform.js"></script><script defer="" src="assets/js/utils.js"></script><script defer="" src="assets/js/error-handling.js"></script><script defer="" src="assets/js/security.js"></script><script defer="" src="assets/js/analytics.js"></script><script defer="" src="assets/js/offline.js"></script><script defer="" src="assets/js/ux-polish.js"></script><script defer="" src="assets/js/parent.js"></script>
<script defer="" src="assets/js/uiux.js"></script>
<script defer="" src="assets/js/v20.js"></script>
<script defer="" src="assets/js/parent-growth.js"></script>
<script defer="" src="assets/js/network-status.js"></script>
<script defer="" src="assets/js/parent-smart.js"></script>
<script defer="" src="assets/js/parent-signup.js"></script>
</body></html>
